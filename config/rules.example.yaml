# Example data quality rules.
# Copy this file to config/rules.yaml and edit dataset names/columns for your source.

customers:
  required_columns:
    - customer_id
    - name
    - email
    - created_at

  not_null_columns:
    - customer_id
    - name
    - email

  unique_columns:
    - customer_id
    - email

  format_checks:
    email: email
    name: alpha_with_spaces

  range_checks:
    name:
      min_length: 2
      max_length: 100

  freshness:
    created_at:
      max_delay_days: 7

  custom_rules:
    email_domains:
      allowed_domains:
        - gmail.com
        - yahoo.com
        - outlook.com
        - company.com

orders:
  required_columns:
    - order_id
    - customer_id
    - order_date
    - amount
    - status

  not_null_columns:
    - order_id
    - customer_id
    - order_date
    - amount
    - status

  unique_columns:
    - order_id

  range_checks:
    amount:
      min: 0
      max: 1000000
    order_date:
      max_date: today

  categorical_checks:
    status:
      allowed_values:
        - pending
        - processing
        - shipped
        - delivered
        - cancelled
        - refunded

  freshness:
    order_date:
      max_delay_days: 1

  referential_integrity:
    customer_id:
      foreign_table: customers
      foreign_column: customer_id

products:
  required_columns:
    - product_id
    - product_name
    - price
    - stock
    - updated_at

  not_null_columns:
    - product_id
    - product_name
    - price
    - stock

  unique_columns:
    - product_id

  format_checks:
    product_name: alphanumeric_with_spaces_and_hyphens

  range_checks:
    product_name:
      min_length: 3
      max_length: 200
    price:
      min: 0
      max: 100000
    stock:
      min: 0
      max: 10000

  freshness:
    updated_at:
      max_delay_days: 3

global_rules:
  row_count:
    min_rows: 1
  completeness_threshold: 0.95
  duplicate_tolerance: 0.01
  anomaly_detection:
    enabled: true
    z_score_threshold: 3
    methods:
      - z_score
  data_drift_detection:
    enabled: true
    baseline_runs: 3
    mean_change_threshold_percent: 25
    std_change_threshold_percent: 30
    psi_threshold: 0.2
  schema_drift_detection:
    enabled: true
    severity: HIGH
  volume_anomaly_detection:
    enabled: true
    baseline_runs: 5
    change_threshold_percent: 40
    severity: HIGH

quality_thresholds:
  critical: 95
  warning: 85
  acceptable: 75
