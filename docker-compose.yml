services:
  postgres:
    image: postgres:16
    container_name: dq_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-data_quality_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-data_quality_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    container_name: dq_dashboard
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: python -m streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501

volumes:
  postgres_data:
