name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python project
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: test_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Check imports
        run: |
          python -c "import checks; print('checks OK:', checks.__file__)"
          python -c "import lineage; print('lineage OK:', lineage.__file__)"
          python -c "import reports; print('reports OK:', reports.__file__)"
          python -c "import sla; print('sla OK:', sla.__file__)"

      - name: Syntax check
        run: python -m compileall .

      - name: Run unit tests
        run: python -m pytest tests/ -q
       